<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Meu Carrinho</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fdf6f0; padding: 40px; display: flex; justify-content: center; }
        .cart-box { background: white; padding: 35px; border-radius: 20px; width: 100%; max-width: 550px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .item-cart { background: #fafafa; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #8b4513; display: flex; justify-content: space-between; align-items: center; }
        
        /* Seção de Cupons no Carrinho */
        .cupons-container { margin: 25px 0; }
        .titulo-secao { font-size: 16px; font-weight: 700; color: #8b4513; margin-bottom: 15px; }
        
        .cupom-card { display: flex; background: #fff5ee; border: 1px solid #ffdac1; border-radius: 12px; margin-bottom: 12px; overflow: hidden; min-height: 80px; align-items: center; }
        .cupom-card.frete { background: #f2fbf5; border-color: #ccefd8; }
        
        .cupom-esquerda { width: 30%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 2px dashed #ffdac1; padding: 10px; box-sizing: border-box; }
        .cupom-card.frete .cupom-esquerda { border-right-color: #ccefd8; }
        
        .cupom-valor { font-size: 20px; font-weight: 700; color: #ff4500; }
        .cupom-card.frete .cupom-valor { color: #27ae60; }
        .cupom-subtexto { font-size: 10px; color: #666; margin-top: 2px; text-align: center; }
        
        .cupom-direita { width: 50%; padding: 10px 15px; text-align: left; }
        .cupom-titulo { font-size: 14px; font-weight: 700; color: #333; margin: 0; }
        .cupom-regra { font-size: 11px; color: #777; margin: 4px 0 0 0; }
        
        .cupom-acao { width: 20%; padding-right: 15px; text-align: right; }
        .btn-aplicar { background: #8b4513; color: white; border: none; padding: 8px 12px; font-size: 12px; font-weight: 700; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .btn-aplicar:hover { background: #d2691e; }

        .btn-checkout { background: #d2691e; color: white; border: none; padding: 16px; font-size: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="cart-box">
        <h2 style="color:#8b4513; text-align:center; margin-top:0;">🛒 Meu Carrinho</h2>
        
        <div id="lista-compras"></div>
        
        <div class="cupons-container">
            <div class="titulo-secao">🎟️ Selecione um Cupom de Desconto:</div>
            <div id="lista-cupons-disponiveis"></div>
        </div>

        <div style="background:#fff8f2; padding:15px; border-radius:10px; margin-top:15px;">
            <p>Subtotal: <span style="float:right;">R$ <span id="subtotal">0.00</span></span></p>
            <p>Frete: <span style="float:right;">R$ <span id="frete">10.00</span></span></p>
            <p style="color:green;">Desconto Aplicado: <span style="float:right;">- R$ <span id="desconto">0.00</span></span></p>
            <hr style="border: 0; border-top: 1px dashed #ffdac1;">
            <h3>Total: <span style="float:right;">R$ <span id="total">0.00</span></span></h3>
        </div>
        <button class="btn-checkout" onclick="finalizarPedido()">CONFIRMAR E FINALIZAR PEDIDO 🎉</button>
    </div>

    <script>
        let itens = JSON.parse(localStorage.getItem('carrinho')) || [];
        let desc = 0;
        let frete = 10;

        // Banco de dados dos cupons disponíveis na sessão atual
        let cuponsDisponiveis = [
            { id: 1, tipo: 'porcento', valor: 10, sub: 'Sem gasto min.!', titulo: 'Cupom geral', regra: 'Limite de R$5', classe: '' },
            { id: 2, tipo: 'porcento', valor: 15, sub: 'Pedidos R$29+', titulo: 'Cupom geral', regra: 'Limite de R$6,52', classe: '' },
            { id: 3, tipo: 'frete', valor: 10, sub: 'Pedidos R$0,01+', titulo: 'Cupom de frete', regra: 'Acumulável', classe: 'frete' }
        ];

        function carregarCarrinho() {
            const list = document.getElementById('lista-compras');
            if(itens.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#999;'>Seu carrinho está vazio.</p>";
                atualizarTotais();
                return;
            }
            list.innerHTML = itens.map((item, idx) => `
                <div class="item-cart">
                    <div>
                        <b>${item.n}</b><br>
                        <small style="color:#7f8c8d;">Modificações: ${item.obs}</small>
                    </div>
                    <span>R$ ${item.p.toFixed(2)} <button onclick="remover(${idx})" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold; margin-left:10px;">❌</button></span>
                </div>
            `).join('');
            atualizarTotais();
        }

        function renderizarCupons() {
            const container = document.getElementById('lista-cupons-disponiveis');
            
            if(cuponsDisponiveis.length === 0) {
                container.innerHTML = "<p style='font-size:12px; color:#999; italic'>Você já utilizou todos os cupons disponíveis!</p>";
                return;
            }

            container.innerHTML = cuponsDisponiveis.map(cupom => `
                <div class="cupom-card ${cupom.classe}">
                    <div class="cupom-esquerda">
                        <span class="cupom-valor">${cupom.tipo === 'porcento' ? cupom.valor + '%' : 'R$' + cupom.valor}</span>
                        <span class="cupom-subtexto">${cupom.sub}</span>
                    </div>
                    <div class="cupom-direita">
                        <p class="cupom-titulo">${cupom.titulo}</p>
                        <p class="cupom-regra">${cupom.regra}</p>
                    </div>
                    <div class="cupom-acao">
                        <button class="btn-aplicar" onclick="ativarCupom(${cupom.id})">Aplicar</button>
                    </div>
                </div>
            `).join('');
        }

        function ativarCupom(id) {
            let sub = itens.reduce((a, b) => a + b.p, 0);
            if(sub === 0) {
                alert("Adicione itens ao carrinho antes de aplicar um cupom!");
                return;
            }

            // Encontra o cupom selecionado
            let cupomIndex = cuponsDisponiveis.findIndex(c => c.id === id);
            let cupom = cuponsDisponiveis[cupomIndex];

            // Aplica a regra de negócio do cupom selecionado
            if(cupom.tipo === 'frete') {
                frete = 0;
                alert("Sucesso! Cupom de Frete Grátis aplicado.");
            } else if(cupom.tipo === 'porcento') {
                if(cupom.valor === 15 && sub < 29) {
                    alert("Este cupom só é válido para pedidos acima de R$ 29,00!");
                    return;
                }
                
                // Calcula o desconto baseado na porcentagem e nos limites fixados nas capturas de tela
                if(cupom.valor === 10) desc = Math.min(sub * 0.10, 5.00);
                if(cupom.valor === 15) desc = Math.min(sub * 0.15, 6.52);
                alert(`Sucesso! Cupom de ${cupom.valor}% aplicado.`);
            }

            // Remove o cupom do array para que ele suma da tela permanentemente nesta compra
            cuponsDisponiveis.splice(cupomIndex, 1);
            
            // Atualiza a interface gráfica
            renderizarCupons();
            atualizarTotais();
        }

        function remover(idx) {
            itens.splice(idx, 1);
            localStorage.setItem('carrinho', JSON.stringify(itens));
            carregarCarrinho();
        }

        function atualizarTotais() {
            let sub = itens.reduce((a, b) => a + b.p, 0);
            if(sub === 0) { desc = 0; frete = 10; } // Reseta se esvaziar o carrinho
            
            let tot = (sub + frete) - desc;
            if(tot < 0) tot = 0;
            
            document.getElementById('subtotal').innerText = sub.toFixed(2);
            document.getElementById('frete').innerText = frete.toFixed(2);
            document.getElementById('desconto').innerText = desc.toFixed(2);
            document.getElementById('total').innerText = tot.toFixed(2);
        }

        function finalizarPedido() {
            if(itens.length === 0) return alert("Carrinho vazio!");
            localStorage.removeItem('carrinho');
            window.location.href = '/entrega';
        }

        // Inicialização
        carregarCarrinho();
        renderizarCupons();
    </script>
</body>
</html>
