<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <title>Sabor Arábico - Dashboard</title>
    <style>
        :root { 
            --bg: #fdf6f0; 
            --text: #333; 
            --card: #fff; 
            --primary: #8b4513;
            --accent: #d2691e;
        }
        .dark-mode { --bg: #222; --text: #fff; --card: #333; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        /* Lateral */
        .sidebar-options { width: 280px; background: var(--primary); color: white; height: 100vh; padding: 20px; position: sticky; top: 0; box-sizing: border-box; display: flex; flex-direction: column; }
        .sidebar-options h2 { font-family: 'Tajawal', sans-serif; font-size: 26px; text-align: center; margin-bottom: 25px; }
        .sidebar-options button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; text-align: left; font-weight: bold; font-family: 'Montserrat', sans-serif; transition: 0.2s; }
        .sidebar-options button:hover { background: #f1f1f1; color: var(--primary); }
        
        /* Conteúdo Principal */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        
        /* Barra de Pesquisa Superior */
        .search-container { margin-bottom: 25px; display: flex; gap: 10px; width: 100%; max-width: 600px; }
        .search-bar { flex: 1; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-family: 'Montserrat', sans-serif; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); background: white; }
        .btn-pesquisar { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-pesquisar:hover { background: #ba5d1d; }

        /* Grid de Restaurantes */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        
        /* Imagens na Raiz da Pasta Static */
        .rest-img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; display: block; }
        .item-linha { display: flex; justify-content: space-between; background: rgba(0,0,0,0.03); padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .item-linha:hover { background: rgba(0,0,0,0.07); }
        
        /* Modais */
        .modal { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; color: #333; width: 460px; margin: 40px auto; padding: 25px; border-radius: 24px; text-align: center; box-sizing: border-box; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        .ingrediente-controle { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #f1f1f1; margin: 5px 0; border-radius: 6px; }
        
        /* Formulários */
        .perfil-group { margin-bottom: 14px; text-align: left; }
        .perfil-group label { font-size: 12px; font-weight: 700; color: #666; display: block; margin-bottom: 5px; }
        .perfil-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        .btn-salvar-dados { background: var(--accent); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Configurações */
        .config-btn { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; cursor: pointer; text-align: left; font-weight: 600; font-size: 14px; }
        .config-btn.danger { background: #fdf3f2; color: #c0392b; border-color: #f5c6cb; }

        /* Histórico de Pesquisa */
        .search-history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #fdfdfd; border: 1px solid #eaeaea; margin-bottom: 8px; border-radius: 8px; font-size: 14px; }
        .search-history-text { color: #333; font-weight: 500; cursor: pointer; text-decoration: underline; }

        .app-version { margin-top: auto; text-align: center; font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 300; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="sidebar-options">
        <h2>Sabor Arábico</h2>
        <button onclick="abrirModalOpcoes('perfil')">👤 Meu Perfil</button>
        <button onclick="abrirModalOpcoes('historico')">🔍 Histórico de Pesquisas</button>
        <button onclick="abrirModalOpcoes('config')">⚙️ Configurações</button>
        <button onclick="window.open('/carrinho', '_self')">🛒 IR PARA O CARRINHO</button>
        
        <div class="app-version">Versão do aplicativo v1.0.4-build_2026</div>
    </div>

    <div class="main-content">
        <div class="search-container">
            <input type="text" id="input-busca-restaurante" class="search-bar" placeholder="Pesquisar restaurante em específico..." onkeyup="if(event.key === 'Enter') realizarPesquisa()">
            <button class="btn-pesquisar" onclick="realizarPesquisa()">Buscar</button>
        </div>

        <h2>Restaurantes Disponíveis</h2>
        
        <div class="grid" id="container-restaurantes">
            {% for r in restaurantes %}
            <div class="card card-restaurante-alvo" data-nome="{{ r.nome.lower() }}">
                <img src="/static/{{ r.img }}" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x140?text={{ r.nome }}';" class="rest-img">
                <h3 style="margin: 10px 0 5px 0;">{{ r.nome }}</h3>
                <small style="color: #d2691e; font-weight: bold; display: block; margin-bottom: 10px;">Cupom Balcão: {{ r.cupom }}</small>
                
                <div style="margin-top: 10px;">
                    {% for prato in r.cardapio %}
                    <div class="item-linha" onclick='detalharPrato("{{ prato.item }}", {{ prato.p }}, {{ prato.ingredientes|tojson }}, "{{ prato.foto }}")'>
                        <span>🥙 {{ prato.item }}</span>
                        <b>R$ {{ "%.2f"|format(prato.p) }}</b>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="modal-geral" class="modal">
        <div class="modal-content">
            <div id="conteudo-modal"></div>
            <button id="btn-voltar-modal" onclick="document.getElementById('modal-geral').style.display='none'" style="width:100%; margin-top:12px; padding:10px; background:#7f8c8d; color:white; border:none; border-radius:8px; cursor:pointer; font-weight: bold;">Voltar</button>
        </div>
    </div>

    <script>
        let pratoAtual = null;
        let modificacoesIngredientes = {};

        // Inicia storages padrão caso não existam
        if(!localStorage.getItem('user_nome')) localStorage.setItem('user_nome', 'Laryssa Gosch');
        if(!localStorage.getItem('user_loc')) localStorage.setItem('user_loc', 'Av. Central dos Árabes, 450');
        if(!localStorage.getItem('user_tel')) localStorage.setItem('user_tel', '(47) 99999-1234');
        if(!localStorage.getItem('historico_pesquisas')) localStorage.setItem('historico_pesquisas', JSON.stringify([]));

        // CONTROLE DE PESQUISA E SALVAMENTO DE HISTÓRICO
        function realizarPesquisa() {
            const termo = document.getElementById('input-busca-restaurante').value.trim();
            
            if(!termo) {
                document.querySelectorAll('.card-restaurante-alvo').forEach(card => card.style.display = "block");
                return;
            }

            // Adiciona termo ao histórico local sem duplicar sequencialmente
            let hist = JSON.parse(localStorage.getItem('historico_pesquisas')) || [];
            if(!hist.includes(termo)) {
                hist.unshift(termo);
                localStorage.setItem('historico_pesquisas', JSON.stringify(hist));
            }

            // Filtro visual nos cards
            document.querySelectorAll('.card-restaurante-alvo').forEach(card => {
                const nomeRest = card.getAttribute('data-nome');
                if(nomeRest.includes(termo.toLowerCase())) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

        function clicarHistorico(termo) {
            document.getElementById('input-busca-restaurante').value = termo;
            document.getElementById('modal-geral').style.display = 'none';
            realizarPesquisa();
        }

        function apagarItemHistorico(index) {
            let hist = JSON.parse(localStorage.getItem('historico_pesquisas')) || [];
            hist.splice(index, 1);
            localStorage.setItem('historico_pesquisas', JSON.stringify(hist));
            abrirModalOpcoes('historico'); // Recarrega a lista no modal
        }

        // CUSTOMIZAÇÃO E DETALHES DOS PRATOS
        function detalharPrato(nome, preco, ingredientes, foto) {
            document.getElementById('btn-voltar-modal').style.display = "block";
            pratoAtual = { nome: nome, preco: preco, ingredientes_originais: [...ingredientes] };
            modificacoesIngredientes = {};
            ingredientes.forEach(ing => { modificacoesIngredientes[ing] = 1; });
            renderizarModalPrato(foto);
        }

        function renderizarModalPrato(foto) {
            const cont = document.getElementById('conteudo-modal');
            cont.innerHTML = `
                <img src="/static/${foto}" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x180?text=${pratoAtual.nome}';" class="modal-img">
                <h2 style="margin:15px 0 5px 0;">${pratoAtual.nome}</h2>
                <h3 style="color:#27ae60; margin:0 0 15px 0;">R$ ${pratoAtual.preco.toFixed(2)}</h3>
                <div style="text-align:left; margin:15px 0;" id="lista-ingredientes-custom"></div>
                <button onclick="adicionarAoCarrinho()" style="background:#27ae60; color:white; border:none; width:100%; padding:12px; font-size:16px; border-radius:8px; cursor:pointer; font-weight:bold;">Adicionar ao Carrinho 🛒</button>
            `;
            renderizarIngredientesLista();
            document.getElementById('modal-geral').style.display = 'block';
        }

        function renderizarIngredientesLista() {
            const container = document.getElementById('lista-ingredientes-custom');
            container.innerHTML = "<b style='font-size:14px; color:#555;'>Personalize seus ingredientes:</b>";
            for(let ing in modificacoesIngredientes) {
                let qtd = modificacoesIngredientes[ing];
                let statusTxt = qtd === 0 ? "<span style='color:red;'> (Sem)</span>" : (qtd > 1 ? `<span style='color:green;'> (X${qtd})</span>` : "");
                container.innerHTML += `
                    <div class="ingrediente-controle">
                        <span style="font-size:14px;">${ing}${statusTxt}</span>
                        <div>
                            <button style="background:#c0392b; color:white; border:none; border-radius:4px; padding:2px 8px; cursor:pointer; font-weight:bold;" onclick="alterarIngrediente('${ing}', -1)">-</button>
                            <button style="background:#27ae60; color:white; border:none; border-radius:4px; padding:2px 8px; cursor:pointer; font-weight:bold;" onclick="alterarIngrediente('${ing}', 1)">+</button>
                        </div>
                    </div>
                `;
            }
        }

        function alterarIngrediente(ing, valor) {
            modificacoesIngredientes[ing] += valor;
            if(modificacoesIngredientes[ing] < 0) modificacoesIngredientes[ing] = 0;
            renderizarIngredientesLista();
        }

        function adicionarAoCarrinho() {
            let resumoIngredientes = [];
            for(let ing in modificacoesIngredientes) {
                if(modificacoesIngredientes[ing] === 0) resumoIngredientes.push(`Sem ${ing}`);
                if(modificacoesIngredientes[ing] > 1) resumoIngredientes.push(`Extra ${ing}`);
            }
            let car = JSON.parse(localStorage.getItem('carrinho')) || [];
            car.push({ n: pratoAtual.nome, p: pratoAtual.preco, obs: resumoIngredientes.join(', ') || "Tradicional" });
            localStorage.setItem('carrinho', JSON.stringify(car));
            alert("Item adicionado ao carrinho!");
            document.getElementById('modal-geral').style.display = 'none';
        }

        // NAVEGAÇÃO INTERNA DO MODAL DE OPÇÕES
        function abrirModalOpcoes(tipo) {
            const cont = document.getElementById('conteudo-modal');
            document.getElementById('modal-geral').style.display = 'block';
            document.getElementById('btn-voltar-modal').style.display = "block";

            if(tipo === 'perfil') {
                cont.innerHTML = `
                    <h2 style="margin-bottom:20px;">👤 Meu Perfil</h2>
                    <div class="perfil-group">
                        <label>NOME COMPLETO</label>
                        <input type="text" id="p-nome" value="${localStorage.getItem('user_nome')}">
                    </div>
                    <div class="perfil-group">
                        <label>ENDEREÇO DE ENTREGA</label>
                        <input type="text" id="p-loc" value="${localStorage.getItem('user_loc')}">
                    </div>
                    <div class="perfil-group">
                        <label>NÚMERO DE TELEFONE</label>
                        <input type="text" id="p-tel" value="${localStorage.getItem('user_tel')}">
                    </div>
                    <button class="btn-salvar-dados" onclick="salvarPerfil()">SALVAR ALTERAÇÕES</button>
                `;
            } 
            else if(tipo === 'historico') {
                let hist = JSON.parse(localStorage.getItem('historico_pesquisas')) || [];
                let htmlHistorico = `<h2>🔍 Histórico de Pesquisas</h2>`;
                
                if(hist.length === 0) {
                    htmlHistorico += `<p style="color:#888; font-size:14px; margin-top:20px;">Nenhuma pesquisa realizada recentemente.</p>`;
                } else {
                    htmlHistorico += `<div style="text-align:left; margin-top:15px; max-height:260px; overflow-y:auto;">`;
                    hist.forEach((termo, index) => {
                        htmlHistorico += `
                            <div class="search-history-item">
                                <span class="search-history-text" onclick="clicarHistorico('${termo}')">${termo}</span>
                                <button onclick="apagarItemHistorico(${index})" style="background:none; border:none; color:#c0392b; font-weight:bold; cursor:pointer;">❌</button>
                            </div>
                        `;
                    });
                    htmlHistorico += `</div>`;
                }
                cont.innerHTML = htmlHistorico;
            }
            else if(tipo === 'config') {
                cont.innerHTML = `
                    <h2 style="margin-bottom:20px;">⚙️ Configurações</h2>
                    <button class="config-btn" onclick="document.body.classList.toggle('dark-mode')">🌓 Alternar Tema Escuro / Claro</button>
                    <button class="config-btn" onclick="limparHistorico()">🧹 Limpar Histórico de Pesquisas</button>
                    <button class="config-btn danger" onclick="window.location.href = '/'">🚪 Sair da Conta (Logout)</button>
                `;
            }
        }

        function salvarPerfil() {
            localStorage.setItem('user_nome', document.getElementById('p-nome').value);
            localStorage.setItem('user_loc', document.getElementById('p-loc').value);
            localStorage.setItem('user_tel', document.getElementById('p-tel').value);
            alert("Informações atualizadas com sucesso!");
            document.getElementById('modal-geral').style.display = 'none';
        }

        function limparHistorico() {
            if(confirm("Deseja apagar suas pesquisas recentes?")) {
                localStorage.setItem('historico_pesquisas', JSON.stringify([]));
                alert("Histórico limpo!");
                document.getElementById('modal-geral').style.display = 'none';
            }
        }
    </script>
</body>
</html>
