<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sabor Arábico - Endereço de Entrega</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #1a1108; 
            color: #f4ecd8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Elementos Decorativos Inspirados na Imagem */
        .decoracao-topo {
            width: 100%;
            height: 120px;
            background: linear-gradient(180deg, #5c3e21 0%, rgba(26,17,8,0) 100%);
            position: relative;
            border-bottom: 2px dashed #d4a373;
            margin-bottom: 20px;
        }
        /* Moldura de arco tradicional esquerdo e direito */
        .decoracao-topo::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 150px; height: 100px;
            background: radial-gradient(circle at 0% 0%, transparent 70px, #5c3e21 71px);
        }
        .decoracao-topo::after {
            content: "";
            position: absolute;
            top: 0; right: 0; width: 150px; height: 100px;
            background: radial-gradient(circle at 100% 0%, transparent 70px, #5c3e21 71px);
        }
        .lanterna-pendente {
            text-align: center;
            color: #e6a15c;
            font-size: 1.5rem;
            margin-top: -10px;
            text-shadow: 0 0 10px #e6a15c;
        }

        .card-arabico { 
            background-color: #26190e; 
            border: 2px solid #8b5a2b; 
            border-radius: 15px; 
            max-width: 750px; 
            margin: 0 auto 30px auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
        }
        .header-tema { 
            background-color: #3d2816; 
            border-bottom: 2px solid #8b5a2b; 
            border-top-left-radius: 13px; 
            border-top-right-radius: 13px; 
            padding: 20px; 
            text-align: center; 
        }
        .header-tema h3 { color: #e6a15c; font-weight: bold; margin-bottom: 5px; }
        
        #map { 
            height: 380px; 
            width: 100%; 
            margin-top: 15px; 
            border-radius: 8px; 
            border: 2px solid #8b5a2b; 
        }
        
        .btn-arabico { 
            background-color: #8b5a2b; 
            color: white; 
            font-weight: bold; 
            border: 1px solid #e6a15c; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            transition: 0.3s; 
        }
        .btn-arabico:hover:not([disabled]) { 
            background-color: #e6a15c; 
            color: #1a1108; 
            box-shadow: 0 0 15px #e6a15c; 
        }
        .btn-arabico:disabled {
            background-color: #3a281a;
            border-color: #5c3e21;
            color: #6e533c;
            cursor: not-allowed;
        }
        .input-custom {
            background-color: #1a1108 !important;
            border: 1px solid #8b5a2b !important;
            color: white !important;
        }
        .input-custom:focus {
            border-color: #e6a15c !important;
            box-shadow: 0 0 8px rgba(230, 161, 92, 0.5) !important;
        }

        .footer-mesquitas { 
            text-align: center; 
            margin-top: 40px; 
            padding-bottom: 20px;
        }
        .footer-mesquitas img { 
            width: 100%; 
            max-width: 650px; 
            height: auto; 
            opacity: 0.7;
            filter: brightness(0.9) sepia(1) hue-rotate(320deg) saturate(2);
        }
    </style>
</head>
<body>

<div class="decoracao-topo">
    <div class="lanterna-pendente">🌙 ✨ 🕌 ✨ 🌙</div>
</div>

<div class="container px-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-danger alert-dismissible fade show max-width: 750px; margin: 10px auto;" role="alert" style="background-color: #5c1d16; color: #fbcbc7; border: 1px solid #a83224;">
            <strong>{{ message }}</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card card-arabico">
        <div class="header-tema">
            <h3>Selecione seu Endereço de Entrega</h3>
            <p class="text-muted mb-0">Use o buscador abaixo para fixar um ponto geográfico real</p>
        </div>
        <div class="card-body p-4">
            <div class="mb-3">
                <label for="autocomplete" class="form-label fw-bold" style="color: #e6a15c;">Endereço de Entrega:</label>
                <input id="autocomplete" class="form-control form-control-lg input-custom" placeholder="Comece a digitar sua rua e número..." type="text" autocomplete="off" />
            </div>

            <div id="map"></div>

            <form action="{{ url_for('pedido.finalizar_pedido') }}" method="POST" class="mt-4">
                <button type="submit" id="btn-confirmar" class="btn btn-arabico" disabled>Confirmar Localização e Fazer Pedido</button>
            </form>
        </div>
    </div>

    <div class="footer-mesquitas">
        <img src="/static/images/silhueta_mesquitas.png" alt="Sabor Arábico Silhueta">
    </div>
</div>

<script>
    let map, autocomplete, marker;

    function initMap() {
        // Coordenada inicial central padrão
        const localizacaoInicial = { lat: -23.55052, lng: -46.633308 };

        map = new google.maps.Map(document.getElementById("map"), {
            center: localizacaoInicial,
            zoom: 14,
            disableDefaultUI: true,
            zoomControl: true,
            styles: [
                { "elementType": "geometry", "stylers": [{ "color": "#242f3e" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#746855" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#242f3e" }] }
            ]
        });

        marker = new google.maps.Marker({
            map: map,
            position: localizacaoInicial,
            draggable: true
        });

        const input = document.getElementById("autocomplete");
        autocomplete = new google.maps.places.Autocomplete(input, {
            fields: ["geometry", "formatted_address"]
        });
        autocomplete.bindTo("bounds", map);

        // Disparado quando o usuário escolhe um endereço real da lista suspensa
        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();

            if (!place.geometry || !place.geometry.location) {
                alert("Por favor, selecione um endereço válido da lista de sugestões.");
                document.getElementById("btn-confirmar").disabled = true;
                return;
            }

            processarNovoEndereco(place.geometry.location, place.formatted_address);
        });

        // Caso o usuário arraste o pino manualmente
        marker.addListener("dragend", () => {
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: marker.getPosition() }, (results, status) => {
                if (status === "OK" && results[0]) {
                    input.value = results[0].formatted_address;
                    processarNovoEndereco(marker.getPosition(), results[0].formatted_address);
                }
            });
        });
    }

    function processarNovoEndereco(location, enderecoTexto) {
        map.setCenter(location);
        map.setZoom(17);
        marker.setPosition(location);

        // Libera o botão de envio no HTML
        document.getElementById("btn-confirmar").disabled = false;

        // AJAX CORRIGIDO: Envia as informações exatas obtidas para o Flask salvar na Session
        fetch('/salvar_endereco_sessao', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                endereco: enderecoTexto,
                lat: location.lat(),
                lng: location.lng()
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.status !== "sucesso") {
                console.error("Erro interno ao persistir a sessão.");
            }
        });
    }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_API_AQUI&libraries=places&callback=initMap" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
